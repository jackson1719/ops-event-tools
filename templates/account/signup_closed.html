{% extends "base.html" %}
{% block title %}No account — Ops Event Tools{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card">
      <div class="card-body text-center">
        <h4 class="card-title mb-3">No account for that sign-in</h4>
        <p class="text-muted">
          Accounts are created by the AV team admins. Ask an admin to create an
          account with your email address, then try again.
        </p>
        <a href="{% url 'accounts:login' %}" class="btn btn-primary">Back to login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
