<!DOCTYPE html>
<html lang="en" data-bs-theme="{{ theme_base|default:'dark' }}" class="theme-{{ theme_name|default:'dark' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Ops Event Tools{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script nonce="{{ csp_nonce }}" src="https://unpkg.com/htmx.org@2.0.4"></script>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <script nonce="{{ csp_nonce }}" src="{% static 'js/behaviors.js' %}" defer></script>
  {% block head %}{% endblock %}
</head>
<body>
  {% include "components/nav.html" %}
  <main class="container-fluid py-3">
    {% include "components/flash.html" %}
    {% block content %}{% endblock %}
  </main>
  <script nonce="{{ csp_nonce }}">
    document.body.addEventListener('htmx:configRequest', function(evt) {
      evt.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
    });
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function() {});
    }
  </script>
  <script nonce="{{ csp_nonce }}" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
