{% if buckets %}
<p class="text-muted mb-2">Staff coverage per 30-minute slot</p>
<div class="d-flex flex-wrap gap-1">
  {% for b in buckets %}
    {% if b.count == 0 %}
      <div style="background:#333;color:#666;padding:8px 4px;border-radius:4px;text-align:center;min-width:70px;font-size:0.75rem;" title="{{ b.label }}: {{ b.count }} staff">
    {% elif b.count <= 2 %}
      <div style="background:#dc2626;color:#fff;padding:8px 4px;border-radius:4px;text-align:center;min-width:70px;font-size:0.75rem;" title="{{ b.label }}: {{ b.count }} staff">
    {% elif b.count <= 4 %}
      <div style="background:#d97706;color:#fff;padding:8px 4px;border-radius:4px;text-align:center;min-width:70px;font-size:0.75rem;" title="{{ b.label }}: {{ b.count }} staff">
    {% elif b.count <= 6 %}
      <div style="background:#059669;color:#fff;padding:8px 4px;border-radius:4px;text-align:center;min-width:70px;font-size:0.75rem;" title="{{ b.label }}: {{ b.count }} staff">
    {% else %}
      <div style="background:#16a34a;color:#fff;padding:8px 4px;border-radius:4px;text-align:center;min-width:70px;font-size:0.75rem;" title="{{ b.label }}: {{ b.count }} staff">
    {% endif %}
      <div style="font-weight:600;">{{ b.label }}</div>
      <div style="font-size:1.2rem;font-weight:bold;">{{ b.count }}</div>
    </div>
  {% endfor %}
</div>
<div class="d-flex gap-3 mt-3" style="font-size:0.75rem;">
  <span><span style="display:inline-block;width:12px;height:12px;background:#333;border-radius:2px;"></span> 0</span>
  <span><span style="display:inline-block;width:12px;height:12px;background:#dc2626;border-radius:2px;"></span> 1-2</span>
  <span><span style="display:inline-block;width:12px;height:12px;background:#d97706;border-radius:2px;"></span> 3-4</span>
  <span><span style="display:inline-block;width:12px;height:12px;background:#059669;border-radius:2px;"></span> 5-6</span>
  <span><span style="display:inline-block;width:12px;height:12px;background:#16a34a;border-radius:2px;"></span> 7+</span>
</div>
{% else %}
<p class="text-muted">No shifts for this day.</p>
{% endif %}
