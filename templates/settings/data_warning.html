{% if event.sheets_enabled %}
<div class="alert alert-warning py-2">
  This event syncs from Google Sheets — rooms, equipment, schedule, and shifts
  edited here are <strong>overwritten on the next sync</strong>. Edit the
  spreadsheet instead, or clear the spreadsheet ID in
  <a href="{% url 'events:settings_event' event.slug %}" class="alert-link">Event Settings</a>
  to make the app authoritative.
</div>
{% endif %}
