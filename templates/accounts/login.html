{% extends "base.html" %}
{% block title %}Login — Ops Event Tools{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card">
      <div class="card-body">
        <h4 class="card-title mb-3">Log In</h4>
        <form method="POST">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" required autofocus>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
          </div>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="keep_signed_in" name="keep_signed_in">
            <label class="form-check-label" for="keep_signed_in">
              Keep me signed in on this device <small class="text-muted">(kiosk / TV display)</small>
            </label>
          </div>
          <button type="submit" class="btn btn-primary w-100">Log In</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
